<!DOCTYPE html>\n<html>\n<head><title>ClawFlow</title></head>\n<body>\n<h1>ClawFlow CLI Dashboard</h1>\n<form id="cli">\n  <input id="args" placeholder="agent create foo" />\n  <button type="submit">Run</button>\n</form>\n<pre id="output"></pre>\n<script>\ndocument.getElementById(cli).onsubmit = async e => {\n  e.preventDefault();\n  const args = document.getElementById(args).value.split( );\n  const res = await fetch(/run, {method:POST,headers:{Content-Type:application/json},body:JSON.stringify({args})});\n  const {output} = await res.json();\n  document.getElementById(output).textContent = output;\n}\n</script>\n</body>\n</html>
